<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" href="/static/icon-192.png" type="image/png">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Admin">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --border:   #21262d;
    --accent:   #58a6ff;
    --green:    #3fb950;
    --yellow:   #d29922;
    --red:      #f85149;
    --muted:    #8b949e;
    --text:     #e6edf3;
    --mono:     'JetBrains Mono', 'Fira Code', monospace;
    --sans:     'Inter', system-ui, sans-serif;
    --radius:   6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  header h1 {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--accent);
  }
  #last-refresh { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  #refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: var(--radius);
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: var(--mono);
    transition: border-color .15s, color .15s;
  }
  #refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── layout ── */
  main {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(520px, 1fr));
    gap: 20px;
    padding: 24px;
    max-width: 1600px;
    margin: 0 auto;
  }
  .card.full { grid-column: 1 / -1; }

  /* ── card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .card-header .spacer { flex: 1; }
  .view-full-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: var(--radius);
    padding: 2px 10px;
    font-size: 11px;
    cursor: pointer;
    font-family: var(--mono);
    transition: border-color .15s, color .15s;
    display: none; /* shown after data loads */
  }
  .view-full-btn:hover { border-color: var(--accent); color: var(--accent); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    font-family: var(--mono);
  }
  .badge-green  { background: #1a3a24; color: var(--green); }
  .badge-yellow { background: #2e2005; color: var(--yellow); }
  .badge-red    { background: #2e0b0b; color: var(--red); }
  .badge-muted  { background: var(--border); color: var(--muted); }

  .card-body { padding: 16px; overflow-x: auto; }

  /* ── markdown ── */
  .md-render {
    font-family: var(--sans);
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }
  .md-render h1 { display: none; }
  .md-render h2 {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 20px 0 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .md-render h2:first-of-type { margin-top: 0; }
  .md-render h3 {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    margin: 8px 0 4px;
    color: var(--text);
  }
  .md-render table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 12px;
    margin-bottom: 12px;
  }
  .md-render th {
    text-align: left;
    color: var(--muted);
    font-weight: 500;
    padding: 4px 8px;
    border-bottom: 1px solid var(--border);
  }
  .md-render td {
    padding: 4px 8px;
    border-bottom: 1px solid #1c2128;
    white-space: nowrap;
  }
  .md-render tr:last-child td { border-bottom: none; }
  .md-render tr:hover td { background: #1c2128; }
  .md-render code {
    font-family: var(--mono);
    font-size: 11px;
    background: #1c2128;
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--accent);
  }
  .md-render pre {
    background: #1c2128;
    padding: 10px 12px;
    border-radius: var(--radius);
    overflow-x: auto;
    font-family: var(--mono);
    font-size: 11px;
    margin: 8px 0;
  }
  .md-render pre code { background: none; padding: 0; color: var(--text); }
  .md-render p { margin: 6px 0; }
  .md-render ul, .md-render ol {
    padding-left: 18px;
    margin: 6px 0;
    font-family: inherit;
    font-size: inherit;
    color: inherit;
  }
  .md-render li {
    margin: 2px 0;
    font-family: inherit;
    font-size: inherit;
    color: inherit;
  }
  .md-render strong { color: var(--text); font-weight: 600; }
  .md-render em { font-style: normal; }
  .md-render a { color: var(--accent); text-decoration: none; }
  /* preamble metadata line only */
  .md-render > p:first-of-type > em { color: var(--muted); font-size: 11px; }

  /* ── modal ── */
  #modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 100;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    overflow-y: auto;
  }
  #modal-backdrop.open { display: flex; }
  #modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 100%;
    max-width: 860px;
    min-height: 200px;
  }
  #modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }
  #modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    padding: 0 4px;
  }
  #modal-close:hover { color: var(--text); }
  #modal-body { padding: 20px; }

  /* ── connections ── */
  .conn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 900px) { .conn-grid { grid-template-columns: 1fr; } }
  .conn-section h3 {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 12px;
  }
  .data-table th {
    text-align: left;
    color: var(--muted);
    font-weight: 500;
    padding: 3px 8px;
    border-bottom: 1px solid var(--border);
  }
  .data-table td { padding: 4px 8px; border-bottom: 1px solid #1c2128; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: #1c2128; }
  .bar-wrap { display: flex; align-items: center; gap: 8px; }
  .bar {
    height: 6px;
    background: var(--accent);
    border-radius: 3px;
    opacity: 0.6;
    min-width: 2px;
  }

  /* ── misc ── */
  .loading { color: var(--muted); font-family: var(--mono); font-size: 12px; padding: 24px; text-align: center; }
  .error { color: var(--red); font-family: var(--mono); font-size: 12px; padding: 16px; background: #2e0b0b44; border-radius: var(--radius); }
  .ts { font-family: var(--mono); font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<header>
  <h1>⬡ admin dashboard</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span id="last-refresh"></span>
    <button id="refresh-btn" onclick="loadAll()">↻ refresh</button>
  </div>
</header>

<main>
  <div class="card" id="card-mikrotik">
    <div class="card-header">
      <span>MikroTik</span>
      <span class="badge badge-muted" id="badge-mikrotik">…</span>
      <span class="spacer"></span>
      <button class="view-full-btn" id="btn-mikrotik" onclick="openModal('mikrotik')">full report ↗</button>
    </div>
    <div class="card-body">
      <div class="loading" id="mikrotik-content">Loading…</div>
    </div>
  </div>

  <div class="card" id="card-proxmox">
    <div class="card-header">
      <span>Proxmox</span>
      <span class="badge badge-muted" id="badge-proxmox">…</span>
      <span class="spacer"></span>
      <button class="view-full-btn" id="btn-proxmox" onclick="openModal('proxmox')">full report ↗</button>
    </div>
    <div class="card-body">
      <div class="loading" id="proxmox-content">Loading…</div>
    </div>
  </div>

  <div class="card full">
    <div class="card-header">
      <span>Firewall Connections</span>
      <span class="spacer"></span>
      <span class="ts" id="conn-ts"></span>
    </div>
    <div class="card-body">
      <div class="loading" id="conn-content">Loading…</div>
    </div>
  </div>
</main>

<!-- modal -->
<div id="modal-backdrop" onclick="handleBackdropClick(event)">
  <div id="modal">
    <div id="modal-header">
      <span id="modal-title"></span>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ── state ────────────────────────────────────────────────────────────────────
const store = {};   // store.mikrotik = { summary }  store.proxmox = ...

// ── utils ────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function verdictBadge(md) {
  const m = md.match(/^## Verdict:\s*(.+)$/m);
  const v = m ? m[1] : '';
  if (/CRITICAL|🔴/.test(v))  return ['CRITICAL', 'badge-red'];
  if (/FINDINGS|⚠️/.test(v))  return ['FINDINGS', 'badge-yellow'];
  if (/HEALTHY|🟢/.test(v))   return ['HEALTHY',  'badge-green'];
  return ['UNKNOWN', 'badge-muted'];
}

function fmtBytes(n) {
  if (n == null) return '—';
  if (n < 1024)       return `${n} B`;
  if (n < 1024**2)    return `${(n/1024).toFixed(1)} KB`;
  if (n < 1024**3)    return `${(n/1024**2).toFixed(1)} MB`;
  return `${(n/1024**3).toFixed(2)} GB`;
}

function normalizeMarkdown(md) {
  return String(md ?? "")
    .replace(/^_(.+)_$/gm, "$1")
    // Verdict already has an H2 heading; drop redundant nested heading.
    .replace(/^### Findings\s*\n+/m, "");
}

function mdDiv(markdown) {
  const d = document.createElement('div');
  d.className = 'md-render';
  d.innerHTML = marked.parse(normalizeMarkdown(markdown));
  return d;
}

// ── report cards ─────────────────────────────────────────────────────────────
async function loadReport(key, endpoint, contentId, badgeId, btnId) {
  const el = document.getElementById(contentId);
  const badge = document.getElementById(badgeId);
  const btn   = document.getElementById(btnId);
  if (!el) return;
  try {
    const r = await fetch(endpoint);
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    const data = await r.json();
    store[key] = { summary: data.summary };

    const [label, cls] = verdictBadge(data.summary);
    badge.textContent = label;
    badge.className = `badge ${cls}`;

    const rendered = mdDiv(data.summary);
    el.className = rendered.className;
    el.innerHTML = rendered.innerHTML;
    btn.style.display = 'block';
  } catch (e) {
    el.className = '';
    el.innerHTML = `<div class="error">Failed to load: ${esc(e.message)}</div>`;
  }
}

// ── modal ────────────────────────────────────────────────────────────────────
async function openModal(key) {
  if (!store[key]) return;
  const endpoint = key === 'mikrotik' ? '/api/mikrotik' : '/api/proxmox';
  document.getElementById('modal-title').textContent =
    key === 'mikrotik' ? 'MikroTik — full report' : 'Proxmox — full report';
  const body = document.getElementById('modal-body');
  body.innerHTML = '<div class="loading">Loading…</div>';
  document.getElementById('modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
  try {
    if (store[key].full) {
      body.innerHTML = '';
      body.appendChild(mdDiv(store[key].full));
      return;
    }
    const r = await fetch(`${endpoint}?full=true`);
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    const data = await r.json();
    store[key].full = data.full;
    body.innerHTML = '';
    body.appendChild(mdDiv(data.full));
  } catch (e) {
    body.innerHTML = `<div class="error">Failed to load: ${esc(e.message)}</div>`;
  }
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
}

function handleBackdropClick(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── connections ───────────────────────────────────────────────────────────────
async function loadConnections() {
  const el   = document.getElementById('conn-content');
  const tsEl = document.getElementById('conn-ts');
  try {
    const r = await fetch('/api/connections');
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    const d = await r.json();

    if (!d.captured_at) {
      el.innerHTML = '<div class="error">No data in connections.db</div>';
      return;
    }
    tsEl.textContent = `snapshot: ${d.captured_at}`;

    const maxBytes = d.top_src[0]?.total_bytes || 1;
    const maxProto = d.protocols[0]?.cnt || 1;

    el.innerHTML = `
    <div class="conn-grid">
      <div class="conn-section">
        <h3>Top sources by traffic</h3>
        <table class="data-table">
          <thead><tr><th>src_addr</th><th>conns</th><th>bytes</th></tr></thead>
          <tbody>
            ${d.top_src.map(r => `
              <tr>
                <td>${esc(r.src_addr) || '—'}</td>
                <td>${r.conns}</td>
                <td><div class="bar-wrap">
                  <div class="bar" style="width:${Math.round(r.total_bytes/maxBytes*80)}px"></div>
                  ${fmtBytes(r.total_bytes)}
                </div></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="conn-section">
        <h3>Protocol breakdown</h3>
        <table class="data-table">
          <thead><tr><th>protocol</th><th>connections</th></tr></thead>
          <tbody>
            ${d.protocols.map(r => `
              <tr>
                <td>${esc(r.protocol) || 'other'}</td>
                <td><div class="bar-wrap">
                  <div class="bar" style="width:${Math.round(r.cnt/maxProto*80)}px"></div>
                  ${r.cnt}
                </div></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="conn-section">
        <h3>TCP states</h3>
        <table class="data-table">
          <thead><tr><th>state</th><th>count</th></tr></thead>
          <tbody>
            ${d.tcp_states.length
              ? d.tcp_states.map(r => `<tr><td>${esc(r.tcp_state) || '—'}</td><td>${r.cnt}</td></tr>`).join('')
              : '<tr><td colspan="2" style="color:var(--muted)">no TCP connections</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>`;
  } catch (e) {
    el.innerHTML = `<div class="error">Failed to load: ${e.message}</div>`;
  }
}

// ── orchestrate ───────────────────────────────────────────────────────────────
function loadAll() {
  loadReport('mikrotik', '/api/mikrotik', 'mikrotik-content', 'badge-mikrotik', 'btn-mikrotik');
  loadReport('proxmox',  '/api/proxmox',  'proxmox-content',  'badge-proxmox',  'btn-proxmox');
  loadConnections();
  document.getElementById('last-refresh').textContent =
    `refreshed ${new Date().toLocaleTimeString()}`;
}

loadAll();
setInterval(loadAll, 5 * 60 * 1000);
</script>
</body>
</html>
